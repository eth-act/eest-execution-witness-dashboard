name: Publish execution witness dashboard

on:
  workflow_dispatch:
    inputs:
      eest_release_tag:
        description: Optional pre-filled EEST release tag, e.g. tests-zkevm@v0.4.2. When set, eest_repo/eest_ref are ignored.
        required: false
        default: ""
      eest_repo:
        description: execution-specs repository URL.
        required: false
        default: https://github.com/ethereum/execution-specs.git
      eest_ref:
        description: execution-specs branch, tag, or commit.
        required: false
        default: projects/zkevm-releases
      filler_path:
        description: execution-specs filler path to generate.
        required: true
        default: tests/amsterdam/eip8025_optional_proofs
      fork:
        description: EEST fork name to fill.
        required: true
        default: Amsterdam
      hive_repo:
        description: Hive repository URL.
        required: true
        default: https://github.com/ethereum/hive.git
      hive_ref:
        description: Hive branch, tag, or commit.
        required: true
        default: master
      hive_ui_repo:
        description: hive-ui repository URL.
        required: true
        default: https://github.com/ethpandaops/hive-ui.git
      hive_ui_ref:
        description: hive-ui branch, tag, or commit.
        required: true
        default: b5441f735366a4f7d13575a020ccd6517d7ecaf3
      el_clients:
        description: Comma-separated EL client descriptor ids to run independently.
        required: true
        default: go-ethereum,ethrex,nethermind
      el_client_overrides_json:
        description: 'JSON descriptor overrides, e.g. {"ethrex":{"ref":"branch"}}.'
        required: false
        default: "{}"
      hive_parallelism:
        description: EEST consume parallelism.
        required: true
        default: "16"
      zkevm_benchmark_workload_output_url:
        description: Optional .tar.gz URL for zkevm-benchmark-workload output. Use none to skip.
        required: false
        default: "none"
      max_site_size_mb:
        description: Fail before upload if site/ is larger than this many MiB.
        required: true
        default: "900"

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare fixtures and client matrix
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    outputs:
      client_matrix: ${{ steps.clients.outputs.matrix }}
    env:
      ROOT_DIR: ${{ github.workspace }}
      EEST_REPO: ${{ inputs.eest_repo }}
      EEST_REF: ${{ inputs.eest_ref }}
      EEST_RELEASE_TAG: ${{ inputs.eest_release_tag }}
      EEST_DIR: ${{ github.workspace }}/execution-specs
      FILLER_PATH: ${{ inputs.filler_path }}
      FORK: ${{ inputs.fork }}
      EL_CLIENTS: ${{ inputs.el_clients }}
      EL_CLIENT_OVERRIDES_JSON: ${{ inputs.el_client_overrides_json }}
      FIXTURES_DIR: ${{ github.workspace }}/fixtures
      UV_CACHE_DIR: /tmp/uv-cache

    steps:
      - name: Checkout dashboard repository
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install OS prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Validate EEST fixture source
        run: scripts/env.sh --validate-eest-source

      - name: Resolve selected EL clients
        id: clients
        run: |
          scripts/env.sh --print
          scripts/list-el-clients.sh
          matrix="$(scripts/list-el-clients.sh --github-matrix)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

      - name: Prepare execution witness fixtures
        run: scripts/prepare-fixtures.sh

      - name: Pack fixtures artifact
        run: tar -czf fixtures.tar.gz -C fixtures .

      - name: Upload fixtures artifact
        uses: actions/upload-artifact@v7
        with:
          retention-days: 1
          if-no-files-found: error
          path: fixtures.tar.gz
          archive: false

  consume:
    name: Consume ${{ matrix.hive_client }}
    runs-on: [self-hosted-ghr, size-xl-x64]
    needs: prepare
    timeout-minutes: 7200
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.client_matrix) }}
    env:
      ROOT_DIR: ${{ github.workspace }}
      EEST_REPO: ${{ inputs.eest_repo }}
      EEST_REF: ${{ inputs.eest_ref }}
      EEST_RELEASE_TAG: ${{ inputs.eest_release_tag }}
      EEST_DIR: ${{ github.workspace }}/execution-specs
      FILLER_PATH: ${{ inputs.filler_path }}
      FORK: ${{ inputs.fork }}
      HIVE_REPO: ${{ inputs.hive_repo }}
      HIVE_REF: ${{ inputs.hive_ref }}
      HIVE_DIR: ${{ github.workspace }}/hive
      EL_CLIENTS: ${{ matrix.id }}
      EL_CLIENT_OVERRIDES_JSON: ${{ inputs.el_client_overrides_json }}
      FIXTURES_DIR: ${{ github.workspace }}/fixtures
      HIVE_RESULTS_DIR: ${{ github.workspace }}/hive/workspace/logs
      HIVE_CLIENT_RESULTS_DIR: ${{ github.workspace }}/hive/workspace/client-results
      HIVE_CONSUME_RESULT_DIR: ${{ github.workspace }}/hive/workspace/client-results/${{ matrix.id }}
      HIVE_SIMULATOR: http://127.0.0.1:3000
      HIVE_PARALLELISM: ${{ inputs.hive_parallelism }}
      HIVE_READY_ATTEMPTS: "600"
      HIVE_CONSUME_ALLOW_FAILURE: "1"
      HIVE_DOCKER_OUTPUT: build
      HIVE_LOG_TO_STDOUT: "1"
      UV_CACHE_DIR: /tmp/uv-cache

    steps:
      - name: Checkout dashboard repository
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24.x
          cache: false

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install OS prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Download fixtures artifact
        uses: actions/download-artifact@v8
        with:
          name: fixtures.tar.gz
          path: .

      - name: Extract fixtures artifact
        run: |
          mkdir -p fixtures
          tar -xzf fixtures.tar.gz -C fixtures

      - name: Prepare execution-specs checkout
        run: scripts/setup-eest.sh

      - name: Run Hive and consume fixtures for ${{ matrix.hive_client }}
        run: scripts/run-hive-consume-client.sh "${{ matrix.id }}"

      - name: Upload per-client Hive results
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true
          path: ${{ env.HIVE_CONSUME_RESULT_DIR }}

      - name: Upload consume debug artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hive-debug-${{ matrix.id }}-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          if-no-files-found: ignore
          include-hidden-files: true
          path: |
            hive/workspace/client-results/${{ matrix.id }}
            hive/workspace/logs
            fixtures/.meta/index.json
            fixtures/.meta/report_consume.html

  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    needs:
      - prepare
      - consume
    timeout-minutes: 120
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      ROOT_DIR: ${{ github.workspace }}
      EEST_REPO: ${{ inputs.eest_repo }}
      EEST_REF: ${{ inputs.eest_ref }}
      EEST_RELEASE_TAG: ${{ inputs.eest_release_tag }}
      EEST_DIR: ${{ github.workspace }}/execution-specs
      FILLER_PATH: ${{ inputs.filler_path }}
      FORK: ${{ inputs.fork }}
      HIVE_REPO: ${{ inputs.hive_repo }}
      HIVE_REF: ${{ inputs.hive_ref }}
      HIVE_DIR: ${{ github.workspace }}/hive
      HIVE_UI_REPO: ${{ inputs.hive_ui_repo }}
      HIVE_UI_REF: ${{ inputs.hive_ui_ref }}
      HIVE_UI_DIR: ${{ github.workspace }}/hive-ui
      HIVE_UI_DISCOVERY_NAME: execution-witness
      EL_CLIENTS: ${{ inputs.el_clients }}
      EL_CLIENT_OVERRIDES_JSON: ${{ inputs.el_client_overrides_json }}
      FIXTURES_DIR: ${{ github.workspace }}/fixtures
      HIVE_RESULTS_DIR: ${{ github.workspace }}/hive/workspace/logs
      HIVE_CLIENT_RESULTS_DIR: ${{ github.workspace }}/hive/workspace/client-results
      HIVE_RESULTS_SOURCE_DIR: ${{ github.workspace }}/hive/workspace/client-results
      HIVE_COMBINED_RESULTS_DIR: ${{ github.workspace }}/hive/workspace/combined-results
      ZKEVM_BENCHMARK_WORKLOAD_OUTPUT_URL: ${{ inputs.zkevm_benchmark_workload_output_url }}
      ZKEVM_BENCHMARK_WORKLOAD_ARCHIVE: ${{ github.workspace }}/hive/workspace/zkevm-benchmark-workload-output.tar.gz
      ZKEVM_BENCHMARK_WORKLOAD_EXTRACT_DIR: ${{ github.workspace }}/hive/workspace/zkevm-benchmark-workload-output
      ZKEVM_CONVERTED_RESULTS_DIR: ${{ github.workspace }}/hive/workspace/zkevm-converted-results
      HIVE_SIMULATOR: http://127.0.0.1:3000
      HIVE_PARALLELISM: ${{ inputs.hive_parallelism }}
      SITE_DIR: ${{ github.workspace }}/site
      SITE_MAX_SIZE_MB: ${{ inputs.max_site_size_mb }}
      SITE_SMOKE_BASE_PATH: ${{ github.event.repository.name }}
      UV_CACHE_DIR: /tmp/uv-cache

    steps:
      - name: Checkout dashboard repository
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24.x
          cache: false

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Install OS prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq rsync

      - name: Prepare Hive checkout for hiveview
        run: scripts/setup-hive.sh

      - name: Download per-client Hive results
        uses: actions/download-artifact@v7
        with:
          pattern: hive-results-*
          path: ${{ env.HIVE_CLIENT_RESULTS_DIR }}

      - name: Merge per-client Hive results
        run: scripts/merge-hive-results.sh

      - name: Download and convert zkEVM benchmark metrics
        run: |
          set -Eeuo pipefail

          url="${ZKEVM_BENCHMARK_WORKLOAD_OUTPUT_URL:-none}"
          case "$(printf '%s' "$url" | tr '[:upper:]' '[:lower:]')" in
            '' | none | null)
              echo "No zkEVM benchmark workload output URL provided; skipping conversion."
              exit 0
              ;;
          esac

          rm -rf "$ZKEVM_BENCHMARK_WORKLOAD_EXTRACT_DIR"
          mkdir -p "$ZKEVM_BENCHMARK_WORKLOAD_EXTRACT_DIR"

          curl --fail --show-error --location \
            --output "$ZKEVM_BENCHMARK_WORKLOAD_ARCHIVE" \
            "$url"
          tar -xzf "$ZKEVM_BENCHMARK_WORKLOAD_ARCHIVE" \
            -C "$ZKEVM_BENCHMARK_WORKLOAD_EXTRACT_DIR"

          metrics_dir=""
          if [ -d "$ZKEVM_BENCHMARK_WORKLOAD_EXTRACT_DIR/zkevm-metrics" ]; then
            metrics_dir="$ZKEVM_BENCHMARK_WORKLOAD_EXTRACT_DIR/zkevm-metrics"
          else
            metrics_dir="$(
              find "$ZKEVM_BENCHMARK_WORKLOAD_EXTRACT_DIR" \
                -type d \
                -name zkevm-metrics \
                -print \
                -quit
            )"
          fi

          if [ -z "$metrics_dir" ]; then
            metric_file="$(
              find "$ZKEVM_BENCHMARK_WORKLOAD_EXTRACT_DIR" \
                -mindepth 3 \
                -maxdepth 3 \
                -type f \
                -name '*.json' \
                ! -name hardware.json \
                -print \
                -quit
            )"
            if [ -n "$metric_file" ]; then
              metrics_dir="$ZKEVM_BENCHMARK_WORKLOAD_EXTRACT_DIR"
            fi
          fi

          if [ -z "$metrics_dir" ]; then
            top_level_dir_count="$(
              find "$ZKEVM_BENCHMARK_WORKLOAD_EXTRACT_DIR" \
                -mindepth 1 \
                -maxdepth 1 \
                -type d \
                -print |
              wc -l
            )"
            if [ "$top_level_dir_count" -eq 1 ]; then
              only_top_level_dir="$(
                find "$ZKEVM_BENCHMARK_WORKLOAD_EXTRACT_DIR" \
                  -mindepth 1 \
                  -maxdepth 1 \
                  -type d \
                  -print \
                  -quit
              )"
              metric_file="$(
                find "$only_top_level_dir" \
                  -mindepth 3 \
                  -maxdepth 3 \
                  -type f \
                  -name '*.json' \
                  ! -name hardware.json \
                  -print \
                  -quit
              )"
              if [ -n "$metric_file" ]; then
                metrics_dir="$only_top_level_dir"
              fi
            fi
          fi

          if [ -z "$metrics_dir" ]; then
            echo "Unable to find zkevm-metrics in downloaded archive." >&2
            echo "Expected zkevm-metrics/<execution-client>/<zkvm>/*.json." >&2
            exit 1
          fi

          python3 scripts/convert-zkevm-metrics-to-hive-results.py \
            --input "$metrics_dir" \
            --output "$ZKEVM_CONVERTED_RESULTS_DIR" \
            --clean-output

      - name: Merge Hive and zkEVM results
        run: |
          set -Eeuo pipefail

          url="${ZKEVM_BENCHMARK_WORKLOAD_OUTPUT_URL:-none}"
          case "$(printf '%s' "$url" | tr '[:upper:]' '[:lower:]')" in
            '' | none | null)
              echo "No zkEVM converted results to merge."
              exit 0
              ;;
          esac

          scripts/merge-hive-result-dirs.sh \
            --output "$HIVE_COMBINED_RESULTS_DIR" \
            --clean-output \
            "$HIVE_RESULTS_DIR" \
            "$ZKEVM_CONVERTED_RESULTS_DIR"

      - name: Build static hive-ui site
        run: |
          set -Eeuo pipefail

          url="${ZKEVM_BENCHMARK_WORKLOAD_OUTPUT_URL:-none}"
          case "$(printf '%s' "$url" | tr '[:upper:]' '[:lower:]')" in
            '' | none | null)
              scripts/build-site.sh
              ;;
            *)
              HIVE_RESULTS_DIR="$HIVE_COMBINED_RESULTS_DIR" scripts/build-site.sh
              ;;
          esac

      - name: Smoke test generated site
        run: scripts/smoke-site.sh

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hive-debug-build-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          if-no-files-found: ignore
          include-hidden-files: true
          path: |
            hive/workspace/client-results
            hive/workspace/logs
            hive/workspace/combined-results
            hive/workspace/zkevm-converted-results
            site/discovery.json
            site/listing.jsonl

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout dashboard repository
        uses: actions/checkout@v6

      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Smoke test deployed Pages site
        env:
          SITE_SMOKE_URL: ${{ steps.deployment.outputs.page_url }}
        run: scripts/smoke-site.sh
