name: Publish execution witness dashboard

on:
  workflow_dispatch:
    inputs:
      dataset_run_id:
        description: Run ID produced by the Prepare execution witness dataset workflow.
        required: true
      el_clients:
        description: Comma-separated Hive client IDs required on the site. Set to none to omit Hive results.
        required: true
        default: ethrex
      zkevm_workload_execution_clients:
        description: Comma-separated zkEVM execution clients required on the site. Set to none to omit.
        required: true
        default: none
      zkevm_workload_zkvms:
        description: Comma-separated zkVMs required for each selected zkEVM execution client.
        required: true
        default: zisk
      hive_ui_repo:
        description: hive-ui repository URL.
        required: true
        default: https://github.com/ethpandaops/hive-ui.git
      hive_ui_ref:
        description: hive-ui branch, tag, or commit.
        required: true
        default: b5441f735366a4f7d13575a020ccd6517d7ecaf3
      max_site_size_mb:
        description: Fail before upload if site/ is larger than this many MiB.
        required: true
        default: "900"

concurrency:
  group: publish-execution-witness-pages
  cancel-in-progress: true

jobs:
  build:
    name: Aggregate results and build Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    env:
      ROOT_DIR: ${{ github.workspace }}
      HIVE_DIR: ${{ github.workspace }}/hive
      HIVE_UI_REPO: ${{ inputs.hive_ui_repo }}
      HIVE_UI_REF: ${{ inputs.hive_ui_ref }}
      HIVE_UI_DIR: ${{ github.workspace }}/hive-ui
      # Used when the dataset was generated from source instead of an EEST release.
      HIVE_UI_DISCOVERY_NAME: execution-witness
      EL_CLIENTS: ${{ inputs.el_clients }}
      EL_CLIENT_OVERRIDES_JSON: "{}"
      ZKEVM_WORKLOAD_EXECUTION_CLIENTS: ${{ inputs.zkevm_workload_execution_clients }}
      ZKEVM_WORKLOAD_ZKVMS: ${{ inputs.zkevm_workload_zkvms }}
      HIVE_RESULTS_DIR: ${{ github.workspace }}/hive/workspace/logs
      HIVE_CLIENT_RESULTS_DIR: ${{ github.workspace }}/hive/workspace/client-results
      HIVE_RESULTS_SOURCE_DIR: ${{ github.workspace }}/hive/workspace/client-results
      HIVE_COMBINED_RESULTS_DIR: ${{ github.workspace }}/hive/workspace/combined-results
      ZKEVM_METRICS_ARTIFACTS_DIR: ${{ github.workspace }}/hive/workspace/zkevm-metrics-artifacts
      ZKEVM_CONVERTED_RESULTS_DIR: ${{ github.workspace }}/hive/workspace/zkevm-converted-results
      SITE_DIR: ${{ github.workspace }}/site
      SITE_MAX_SIZE_MB: ${{ inputs.max_site_size_mb }}
      SITE_SMOKE_BASE_PATH: ${{ github.event.repository.name }}
      UV_CACHE_DIR: /tmp/uv-cache
      GH_TOKEN: ${{ github.token }}
      DATASET_RUN_ID: ${{ inputs.dataset_run_id }}

    steps:
      - name: Checkout dashboard repository
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24.x
          cache: false

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Install OS prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq rsync unzip

      - name: Validate publish inputs
        run: |
          set -Eeuo pipefail
          if [ "$GITHUB_REF" != refs/heads/main ]; then
            echo "GitHub Pages publication must run from refs/heads/main" >&2
            exit 1
          fi
          case "$DATASET_RUN_ID" in
            ''|*[!0-9]*|0) echo "dataset_run_id must be a positive numeric workflow run ID" >&2; exit 1 ;;
          esac
          case "$SITE_MAX_SIZE_MB" in
            ''|*[!0-9]*|0) echo "max_site_size_mb must be a positive integer" >&2; exit 1 ;;
          esac

      - name: Download dataset manifest
        uses: actions/download-artifact@v8
        with:
          name: dataset-manifest-${{ inputs.dataset_run_id }}
          path: dataset
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.dataset_run_id }}

      - name: Validate and configure dataset
        run: |
          set -Eeuo pipefail
          python3 scripts/dashboard-artifacts.py validate-dataset \
            --manifest dataset/dataset.json \
            --dataset-id "$DATASET_RUN_ID" \
            --repository "$GITHUB_REPOSITORY"

          eest_release_tag="$(jq -r '.eest.release_tag' dataset/dataset.json)"
          hive_ui_discovery_name="execution-witness"
          if [ -n "$eest_release_tag" ]; then
            # HiveUI displays the discovery name as the group title. Keep the
            # exact release identity while making the tag easier to read.
            hive_ui_discovery_name="${eest_release_tag/@/ }"
          fi

          {
            echo "EEST_REPO=$(jq -r '.eest.repo' dataset/dataset.json)"
            echo "EEST_REF=$(jq -r '.eest.commit' dataset/dataset.json)"
            echo "EEST_RELEASE_TAG="
            echo "FILLER_PATH=$(jq -r '.eest.filler_path' dataset/dataset.json)"
            echo "FORK=$(jq -r '.eest.fork' dataset/dataset.json)"
            echo "HIVE_REPO=$(jq -r '.hive.repo' dataset/dataset.json)"
            echo "HIVE_REF=$(jq -r '.hive.commit' dataset/dataset.json)"
            echo "ZKEVM_BENCHMARK_WORKLOAD_REPO=$(jq -r '.zkevm_benchmark.repo' dataset/dataset.json)"
            echo "ZKEVM_BENCHMARK_WORKLOAD_REF=$(jq -r '.zkevm_benchmark.commit' dataset/dataset.json)"
            echo "ZKEVM_RAYON_THREADS=$(jq -r '.zkevm_benchmark.rayon_threads' dataset/dataset.json)"
            echo "HIVE_UI_DISCOVERY_NAME=$hive_ui_discovery_name"
          } >> "$GITHUB_ENV"

      - name: Prepare pinned Hive checkout for hiveview
        run: |
          set -Eeuo pipefail
          hive_setup_clients="$EL_CLIENTS"
          case "$(printf '%s' "$hive_setup_clients" | tr '[:upper:]' '[:lower:]')" in
            none|skip|empty)
              hive_setup_clients="$(jq -r '.clients | keys[0] // empty' config/el-clients.json)"
              if [ -z "$hive_setup_clients" ]; then
                echo "config/el-clients.json must contain at least one descriptor to prepare Hive" >&2
                exit 1
              fi
              ;;
          esac
          EL_CLIENTS="$hive_setup_clients" scripts/setup-hive.sh

      - name: Resolve newest workload artifacts
        run: |
          set -Eeuo pipefail
          mkdir -p artifact-inventory

          mapfile -t hive_clients < <(scripts/list-el-clients.sh --ids)
          mapfile -t zkevm_runs < <(
            scripts/list-zkevm-workload-runs.sh --json |
              jq -r '.[] | [.execution_client, .zkvm] | join(":")'
          )

          if [ "${#hive_clients[@]}" -eq 0 ] && [ "${#zkevm_runs[@]}" -eq 0 ]; then
            echo "At least one Hive client or zkEVM workload must be selected" >&2
            exit 1
          fi

          names=()
          resolver_args=()
          for client in "${hive_clients[@]}"; do
            names+=("hive-results-v1-$DATASET_RUN_ID-$client")
            resolver_args+=(--hive-client "$client")
          done
          for workload in "${zkevm_runs[@]}"; do
            client="${workload%%:*}"
            zkvm="${workload#*:}"
            names+=("zkevm-metrics-v1-$DATASET_RUN_ID-$client-$zkvm")
            resolver_args+=(--zkevm-run "$workload")
          done

          index=0
          for name in "${names[@]}"; do
            gh api --method GET \
              --paginate \
              --slurp \
              "/repos/$GITHUB_REPOSITORY/actions/artifacts" \
              -f "name=$name" \
              -f per_page=100 > "artifact-inventory/$index.json"
            index=$((index + 1))
          done
          jq -s 'add' artifact-inventory/*.json > artifact-inventory.json

          python3 scripts/dashboard-artifacts.py resolve \
            --inventory artifact-inventory.json \
            --output selected-artifacts.json \
            --dataset-id "$DATASET_RUN_ID" \
            --branch main \
            "${resolver_args[@]}"

      - name: Download, validate, and stage workload artifacts
        run: |
          set -Eeuo pipefail
          rm -rf downloaded-artifacts "$HIVE_CLIENT_RESULTS_DIR" "$ZKEVM_METRICS_ARTIFACTS_DIR"
          mkdir -p downloaded-artifacts "$HIVE_CLIENT_RESULTS_DIR" "$ZKEVM_METRICS_ARTIFACTS_DIR"

          while IFS= read -r selected; do
            artifact_id="$(jq -r '.artifact_id' <<< "$selected")"
            artifact_name="$(jq -r '.name' <<< "$selected")"
            run_id="$(jq -r '.run_id' <<< "$selected")"
            head_sha="$(jq -r '.head_sha' <<< "$selected")"
            kind="$(jq -r '.kind' <<< "$selected")"
            client_id="$(jq -r '.client_id' <<< "$selected")"
            zkvm="$(jq -r '.zkvm // empty' <<< "$selected")"
            destination="downloaded-artifacts/$artifact_id"

            mkdir -p "$destination"
            gh run download "$run_id" --name "$artifact_name" --dir "$destination"

            validate_args=(
              --manifest "$destination/result-manifest.json"
              --dataset-manifest dataset/dataset.json
              --payload "$destination/payload"
              --kind "$kind"
              --client-id "$client_id"
              --producer-run-id "$run_id"
              --producer-sha "$head_sha"
              --repository "$GITHUB_REPOSITORY"
            )
            if [ -n "$zkvm" ]; then
              validate_args+=(--zkvm "$zkvm")
            fi
            python3 scripts/dashboard-artifacts.py validate-result "${validate_args[@]}"

            if [ "$kind" = hive ]; then
              cp -a "$destination/payload"/. "$HIVE_CLIENT_RESULTS_DIR"/
            else
              mkdir -p "$ZKEVM_METRICS_ARTIFACTS_DIR/$artifact_name"
              cp -a "$destination/payload"/. "$ZKEVM_METRICS_ARTIFACTS_DIR/$artifact_name"/
            fi
          done < <(jq -c '.[]' selected-artifacts.json)

      - name: Summarize selected artifacts
        run: |
          {
            echo "## Publication inputs"
            echo
            echo "Dataset run ID: \`$DATASET_RUN_ID\`"
            echo
            echo "| Workload | Artifact | Producer run | Artifact ID |"
            echo "| --- | --- | ---: | ---: |"
            jq -r '.[] | "| \(.kind):\(.client_id)\(if .zkvm then ":" + .zkvm else "" end) | `\(.name)` | \(.run_id) | \(.artifact_id) |"' selected-artifacts.json
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Merge per-client Hive results
        run: |
          set -Eeuo pipefail
          case "$(printf '%s' "$EL_CLIENTS" | tr '[:upper:]' '[:lower:]')" in
            none|skip|empty)
              rm -rf "$HIVE_RESULTS_DIR"
              mkdir -p "$HIVE_RESULTS_DIR"
              ;;
            *)
              scripts/merge-hive-results.sh
              ;;
          esac

      - name: Convert and merge zkEVM benchmark metrics
        run: |
          set -Eeuo pipefail

          rm -rf "$ZKEVM_CONVERTED_RESULTS_DIR"
          mkdir -p "$ZKEVM_CONVERTED_RESULTS_DIR" "$ZKEVM_METRICS_ARTIFACTS_DIR"

          converted_sources=("$HIVE_RESULTS_DIR")
          converted_count=0
          while IFS= read -r -d '' metrics_dir; do
            artifact_name="$(basename "$metrics_dir")"
            output_dir="$ZKEVM_CONVERTED_RESULTS_DIR/$artifact_name"
            python3 scripts/convert-zkevm-metrics-to-hive-results.py \
              --input "$metrics_dir" \
              --output "$output_dir" \
              --clean-output
            converted_sources+=("$output_dir")
            converted_count=$((converted_count + 1))
          done < <(scripts/list-zkevm-metrics-roots.sh --null "$ZKEVM_METRICS_ARTIFACTS_DIR")

          expected_zkevm_count="$(scripts/list-zkevm-workload-runs.sh --json | jq 'length')"
          if [ "$converted_count" -ne "$expected_zkevm_count" ]; then
            echo "Expected $expected_zkevm_count zkEVM metrics roots, found $converted_count" >&2
            exit 1
          fi

          scripts/merge-hive-result-dirs.sh \
            --output "$HIVE_COMBINED_RESULTS_DIR" \
            --clean-output \
            "${converted_sources[@]}"

      - name: Upload full combined Hive results
        uses: actions/upload-artifact@v7
        with:
          name: hive-combined-results-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          if-no-files-found: error
          include-hidden-files: true
          path: ${{ env.HIVE_COMBINED_RESULTS_DIR }}

      - name: Build static hive-ui site
        run: HIVE_RESULTS_DIR="$HIVE_COMBINED_RESULTS_DIR" scripts/build-site.sh

      - name: Smoke test generated site
        run: scripts/smoke-site.sh

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hive-debug-build-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          if-no-files-found: ignore
          include-hidden-files: true
          path: |
            dataset/dataset.json
            selected-artifacts.json
            downloaded-artifacts
            hive/workspace/client-results
            hive/workspace/logs
            hive/workspace/combined-results
            hive/workspace/zkevm-metrics-artifacts
            hive/workspace/zkevm-converted-results
            site/discovery.json
            site/listing.jsonl

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout dashboard repository
        uses: actions/checkout@v6

      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Smoke test deployed Pages site
        env:
          SITE_SMOKE_URL: ${{ steps.deployment.outputs.page_url }}
        run: scripts/smoke-site.sh
